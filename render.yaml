services:
  - type: web
    name: nibo-clone-api
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx playwright install chromium && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CERT_ENCRYPTION_KEY
        generateValue: true
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: NODE_OPTIONS
        value: "--openssl-legacy-provider"
