services:
  - type: web
    name: nibo-clone-api
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx playwright install --with-deps chromium && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CERT_ENCRYPTION_KEY
        generateValue: true
